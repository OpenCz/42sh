name: CI

on:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    branches-ignore:
      - "no-ga/**"

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL }}
  EXECUTABLES: ${{ vars.EXECUTABLES }}
  PRIVATE_SSH_KEY: ${{ secrets.PRIVATE_SSH_KEY }}
  CC: epiclang

jobs:
  check_mirror:
    environment: production
    runs-on: ubuntu-latest

    outputs:
      is_mirror: ${{ steps.check.outputs.is_mirror }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        run: |
          ORIGIN=$(git remote get-url origin)
          ORIGIN=$(echo $ORIGIN | sed 's|https://github.com|git@github.com:|; s|$|.git|')
          ORIGIN=$(echo $ORIGIN | sed 's/com:\//com:/')

          echo "is_mirror=$( [ "$ORIGIN" = "$MIRROR_SSH_URL" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  check_compilation_and_coding_style:
    needs: check_mirror
    if:
      needs.check_mirror.outputs.is_mirror == 'false'
    environment: production
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Repository Structure
        continue-on-error: true
        run: banana-check-repo > banana-check-repo.log || true

      - name: Annotate Coding Style Infractions Repository
        run: |
          if [ -s banana-check-repo.log ]; then
            grep "\[Banana\]" banana-check-repo.log | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d':' -f1 | sed 's|^\./||')
              LINE=$(echo "$line" | cut -d':' -f2)
              
              if [ "$LINE" -eq "$LINE" ] 2>/dev/null; then
                  [ "$LINE" -le 0 ] && LINE=1
              else
                  LINE=1
              fi

              LEVEL=$(echo "$line" | sed -n 's/.*\[Banana\] \[\([^]]*\)\].*/\1/p')
              CODE=$(echo "$line" | sed -n 's/.*(\([^)]*\)).*/\1/p')
              MSG=$(echo "$line" | sed -E 's/.*\] (.*) \(.*\)/\1/')

              echo "::error file=$FILE,line=$LINE,title=$LEVEL coding style error::$CODE - $MSG"
            done
          fi

      - name: build
        run: make 2>&1 | tee build.log

        timeout-minutes: 2

      - name: check_coding_style
        run: |
          if [ -s build.log ]; then
            grep -E "error:|warning:" build.log | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d':' -f1)
              LINE=$(echo "$line" | cut -d':' -f2)
              MSG=$(echo "$line" | sed -E 's/^[^:]+:[0-9]+:[0-9]+:[[:space:]]*(error|warning):[[:space:]]*//; s/^\[Banana\][[:space:]]*//; s/^\[[^]]+\][[:space:]]*//; s/[[:space:]]*\([^()]*\)[[:space:]]*$//')

              if [ "$LINE" -eq "$LINE" ] 2>/dev/null; then
                  [ "$LINE" -le 0 ] && LINE=1
              else
                  LINE=1
              fi

              LEVEL=$(echo "$line" | sed -nE 's/.*\[Banana\][[:space:]]*\[([^]]+)\].*/\1/p')
              CODE=$(echo "$line" | sed -nE 's/.*\(([^()]*)\)[[:space:]]*$/\1/p')

              [ -z "$LEVEL" ] && LEVEL=$(echo "$line" | sed -nE 's/.*\b(error|warning):.*/\1/p')
              [ -z "$CODE" ] && CODE=compiler

              echo "::error file=$FILE,line=$LINE,title=$LEVEL coding style error::$CODE - $MSG"
            done
            
            if grep -Eq "error:|warning:" build.log; then
              exit 1
            fi
          fi
      
      - name: Cleanup
        run: make clean

      - name: Check Executables
        run: |
          list="$EXECUTABLES"

          while :; do
            case "$list" in
              *,*)
                exe="${list%%,*}"
                list="${list#*,}"
                ;;
              *)
                exe="$list"
                list=""
                ;;
            esac

            exe="$(echo "$exe" | xargs)"
            if [ -z "$exe" ]; then
              [ -z "$list" ] && break
              continue
            fi
            if [ ! -f "$exe" ]; then
              echo "::error file=$exe,title=Missing Executable::$exe is missing after build"
              exit 1
            fi
            [ -z "$list" ] && break
          done
        
  run_tests:
    environment: production
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    needs:
      - check_mirror
      - check_compilation_and_coding_style
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: testers
        run: make tests_run
        timeout-minutes: 2
  
  merge_to_main:
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs:
      - check_mirror
      - run_tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get body content
        id: pr_body
        run: |
          echo "COMMITS_LIST<<EOF" >> $GITHUB_ENV
          echo "### List of changements: " >> $GITHUB_ENV
          git log origin/main..HEAD --oneline --pretty=format:"- %s (%h)" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create PR dev -> main
        run: |
          gh pr create \
            --title "merge: ${{ github.ref_name }} -> main" \
            --body "$COMMITS_LIST" \
            --reviewer "lukas-sgx,copilot" \
            --base main \
            --head dev || echo "PR already exists or could not be created"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto_approve_trusted_authors:
    if:
      github.ref == 'refs/heads/dev' && github.event_name == 'push'
    needs:
      - merge_to_main
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Verify commit authors
        id: verify_authors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --base main \
            --head dev \
            --json number \
            --jq '.[0].number // ""')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for dev -> main."
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          ALLOWED_AUTHORS="lukas-sgx celz-pch"
          AUTHORS=$(gh api \
            repos/$REPO/pulls/$PR_NUMBER/commits \
            --paginate \
            --jq '.[] | (.author.login // .committer.login // "")' | \
            sed '/^[[:space:]]*$/d' | tr '[:upper:]' '[:lower:]' | sort -u)

          echo "Resolved commit authors:"
          echo "$AUTHORS"

          if [ -z "$AUTHORS" ]; then
            echo "No GitHub logins resolved from commits."
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INVALID=0
          for author in $AUTHORS; do
            author="$(printf '%s' "$author" | tr '[:upper:]' '[:lower:]')"
            case " $ALLOWED_AUTHORS " in
              *" $author "*) ;;
              *)
                INVALID=1
                break
                ;;
            esac
          done

          if [ "$INVALID" -eq 0 ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-approve PR
        if: steps.verify_authors.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          PR_NUMBER="${{ steps.verify_authors.outputs.pr_number }}"
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login // ""')
          REVIEWER=$(gh api user --jq '.login // ""')

          if [ -z "$REVIEWER" ]; then
            echo "Unable to resolve reviewer identity from token. Skipping auto-approve."
            exit 0
          fi

          if [ "$PR_AUTHOR" = "$REVIEWER" ]; then
            echo "Cannot approve own PR ($REVIEWER). Skipping auto-approve."
            exit 0
          fi

          if ! gh pr review "$PR_NUMBER" \
            --repo "$REPO" \
            --approve \
            --body "Auto-approved: all commits are authored by lukas-sgx or Celz-Pch."; then
            echo "Auto-approve skipped: token lacks permission (HTTP 403) or cannot approve this PR."
            exit 0
          fi

      - name: Merge PR to main
        if: steps.verify_authors.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          PR_NUMBER="${{ steps.verify_authors.outputs.pr_number }}"
          if ! gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --merge \
            --auto; then
            echo "Auto-merge skipped: token lacks permission (HTTP 403) or branch protection blocks merge."
            exit 0
          fi

  
  push_to_mirror:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - check_mirror
      - run_tests
    environment: production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ vars.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY }}
          ssh_username: git